  <section class="add-recipe">
    <h1>Add New Recipe</h1>
    <p class="subtitle">Share your culinary creation with our community</p>

    <form id="addRecipeForm">
      <h2>Recipe Detail</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="title">Recipe Title</label>
          <input type="text" id="title" placeholder="My delicious pasta">
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option>Enter your recipe category</option>
            <option>Breakfast</option>
            <option>Lunch</option>
            <option>Dinner</option>
            <option>Snacks</option>
            <option>Desserts</option>
            <option>Drinks</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="ingredients">Ingredients</label>
        <textarea id="ingredients" rows="4" placeholder="Describe ingredients here..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="prep-time">Preparation Time</label>
          <input type="text" id="prep-time" placeholder="15 minutes">
        </div>

        <div class="form-group">
          <label for="cook-time">Cooking Time</label>
          <input type="text" id="cook-time" placeholder="10 minutes">
        </div>
      </div>

      <div class="form-group">
        <label for="instructions">Instruction</label>
        <textarea id="instructions" rows="5" placeholder="step 1: instructions..."></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="cancel">Cancel</button>
        <button type="submit" class="save">Save</button>
      </div>
    </form>
  </section>

</body>
</html>
