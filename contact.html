<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="contact.css">
</head>
<script src="script.js"></script>
<body>

  <nav>
  <a href="index.html" class="logo">
    <img src="https://img.icons8.com/ios-filled/50/FD7E14/restaurant.png" alt="logo">
    <span>FlavorArchive</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="categories.html">Recipes</a>
    <a href="my_recipes.html">My Recipes</a>
    <a href="saved_recipes.html">Saved Recipes</a>
    <a href="add_recipe.html">Add Recipe</a>
    <a href="blog.html">Blog</a>
  </div>
  
  <div class="profile-dropdown">
    <button class="profile-btn">Account</button>
    <div class="dropdown-content">
      <a href="profile_settings.html">Settings</a>
      <a href="contact.html">Contact Us</a>
      <a href="login.html">Sign Out</a>
    </div>
  </div>
</nav>

  <section class="contact-content">
    <h1>Get in Touch</h1>
    <p class="subtitle">We value your feedback and are here to help!</p>

    <div class="contact-box">
      <form>
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject">
            <option>General Inquiry</option>
            <option>Report a Bug</option>
            <option>Recipe Submission Question</option>
            <option>Account Support</option>
          </select>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
        </div>
        <button type="submit" class="send-btn">Send Message</button>
      </form>
    </div>
  </section>

</body>
</html>
