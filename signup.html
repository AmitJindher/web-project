<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - FlavorArchive</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
</head>
<script src="script.js"></script>
<body>

  <nav>
  <a href="index.html" class="logo">
    <img src="https://img.icons8.com/ios-filled/50/FD7E14/restaurant.png" alt="logo">
    <span>FlavorArchive</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="categories.html">Recipes</a>
    <a href="my_recipes.html">My Recipes</a>
    <a href="saved_recipes.html">Saved Recipes</a>
    <a href="add_recipe.html">Add Recipe</a>
    <a href="blog.html">Blog</a>
  </div>
  
  <div class="profile-dropdown">
    <button class="profile-btn">Account</button>
    <div class="dropdown-content">
      <a href="profile_settings.html">Settings</a>
      <a href="contact.html">Contact Us</a>
      <a href="login.html">Sign Out</a>
    </div>
  </div>
</nav>
  <section class="signin">
    <h1>Create an Account</h1>
    <p class="subtitle">Join our community and share your recipes</p>

    <div class="signin-box">
      <form>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Enter your name">
        </div>
      
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password">
        </div>
        
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Confirm your password">
        </div>

        <button type="submit" class="btn">Create Account</button>

        <div class="extra-links">
          <a href="login.html">Already have an account? Sign In</a>
        </div>
      </form>
    </div>
  </section>

  <footer>
    © FlavorArchive • Demo layout built with HTML & CSS
  </footer>

</body>
</html>
